<!-- 使用js的方式引入vuejs -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="./vue3.js"></script>
</head>
<body>
    <div id="counter">
        <!-- 告诉 vue，这个里面放了一个变量 -->
        <p>{{ num }}</p>
        <p>{{ uname }}</p>
    </div>
    <script>
        const Counter = { // 配置对象
            data:function(){
                return {
                    num:0,
                    uname:"张三"
                }
            }
        }
        let app = Vue.createApp(Counter).mount('#counter') // 创建应用，将配置对象传入，mount进行挂载，和上面的元素相关联
        console.log(app)
        // 对 app.num 进行修改，页面上的 num 也会自动随之修改，，数据的双向绑定
    </script>
</body>
</html>
